<div class="login-container">

    <!-- LADO ESQUERDO -->
    <section class="lado-esquerdo">

        <img src="/img/logo.png" alt="MentalHealth Connect" class="logo">

        <h1>MentalHealth Connect</h1>

        <p>
            Sua saúde mental importa.<br>
            Conectando pessoas a profissionais especializados.
        </p>

    </section>

    <!-- LADO DIREITO -->
    <section class="lado-direito">

        <div class="login-box">

            <h2>Iniciando Sessão</h2>

            <form>

                <label for="email">E-mail</label>

                <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Digite seu e-mail">

                <label for="senha">Senha</label>

                <div class="senha-container">

                    <input id="senha" [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha" name="senha"
                        placeholder="Digite sua senha">

                    <i class="bi" [class.bi-eye]="mostrarSenha" [class.bi-eye-slash]="!mostrarSenha"
                        (click)="alternarSenha()">
                    </i>

                </div>

                <div class="lgpd">

                    <input type="checkbox" id="lgpd" [(ngModel)]="aceitouTermos" name="aceitouTermos">

                    <label for="lgpd">
                        Li e concordo com os Termos de Uso e com a Política de Privacidade.
                    </label>

                </div>

                <button type="button" (click)="entrar()">
                    Entrar
                </button>

                <p class="erro" *ngIf="mensagemErro">
                    {{ mensagemErro }}
                </p>

                <div class="links">

                    <a href="#">Esqueci minha senha</a>

                    <a href="#">Criar conta</a>

                </div>

            </form>

        </div>

    </section>

</div>
