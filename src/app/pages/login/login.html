<div class="container">

    <div class="lado-esquerdo">
        <img src="/img/logo.png" alt="Logo" class="logo">

        <h1>MentalHealth Connect</h1>

        <p>
            Sua saúde mental importa.
            Conectando pessoas a profissionais especializados.
        </p>
    </div>

    <div class="lado-direito">

        <h2>Iniciando Sessão</h2>

        <form>

            <label>E-mail</label>
            <input type="email" [(ngModel)]="email" name="email" placeholder="Digite seu e-mail">

            <div class="senha-container">

                <input [type]="mostrarSenha ? 'text' : 'password'" [(ngModel)]="senha" name="senha"
                    placeholder="Digite sua senha">

                <i class="bi" [class.bi-eye]="mostrarSenha" [class.bi-eye-slash]="!mostrarSenha"
                    (click)="alternarSenha()">
                </i>
            </div>

            <div class="lgpd">
                <input type="checkbox" [(ngModel)]="aceitouTermos" name="Termos">
                <span>Li e concordo com os Termos de Uso e com a Política de Privacidade</span>
            </div>

            <button type="button" (click)="entrar()">Entrar</button>

            <p class="erro" *ngIf="mensagemErro">
                {{ mensagemErro }}
            </p>

            <a href="#">Esqueci minha senha</a>
            <a href="#">Criar conta</a>

        </form>

    </div>

</div>
